name: Recalibrate Macro Score Thresholds (Quarterly)

on:
  workflow_dispatch:
    inputs:
      n_folds:
        description: 'Walk-forward 折數'
        required: false
        default: '4'
      holdout_months:
        description: 'Holdout 凍結月數（末段不參與校準）'
        required: false
        default: '36'
      n_bootstrap:
        description: 'Bootstrap CI resample 次數'
        required: false
        default: '1000'
  # 每季首日 UTC 00:00（1/4/7/10 月 1 號）— 鏡像 stock recalibrate_macro.yml
  schedule:
    - cron: '0 0 1 1,4,7,10 *'

permissions:
  contents: write
  pull-requests: write

jobs:
  recalibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Walk-Forward Calibration (5-gate anti-overfit)
        run: |
          python scripts/calibrate_macro_score.py \
            --n-folds ${{ github.event.inputs.n_folds || '4' }} \
            --holdout-months ${{ github.event.inputs.holdout_months || '36' }} \
            --n-bootstrap ${{ github.event.inputs.n_bootstrap || '1000' }} \
            --emit-json data_cache/macro_thresholds_global.json \
            --emit-proposal MACRO_SCORE_CALIBRATION_PROPOSAL.md

      - name: Detect Changes
        id: check
        run: |
          if git diff --quiet data_cache/macro_thresholds_global.json MACRO_SCORE_CALIBRATION_PROPOSAL.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "→ 門檻 & proposal 無變動，跳過開 PR"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for Human Review
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y%m%d)
          BRANCH="auto/recalibrate-macro-score-${DATE}"
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data_cache/macro_thresholds_global.json MACRO_SCORE_CALIBRATION_PROPOSAL.md
          git commit -m "auto(calibrate): 季度 VIX 閾值校準建議 ($DATE)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "auto: 季度 macro_score VIX 閾值校準 ($DATE)" \
            --body-file MACRO_SCORE_CALIBRATION_PROPOSAL.md \
            --base main \
            --head "$BRANCH"
