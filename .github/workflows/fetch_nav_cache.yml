name: "每日淨值快取更新"

on:
  # v19.364 3/8：停每日排程 — GitHub 美國 IP 對台灣基金源已實證全抓不到
  # （TDCC 3-4 回空、AllianzGI/CnYES/MoneyDJ/Yahoo 被擋，run #557/#71 log 證據），
  # 每天只產生空跑 commit + 假覆蓋警告。累積改由台灣端 NAS cron 接手
  # （scripts/accumulate_nav_tw.py，v19.363）。保留手動觸發：未來來源復活或
  # 想測試時在 Actions 頁點 Run workflow 即可，恢復排程只需還原本段 cron。
  workflow_dispatch:

jobs:
  fetch-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 push cache 檔案

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # requests=核心抓取；pandas/gspread/google-auth=可選 Sheet 自動同步持倉代碼
        # beautifulsoup4+lxml=Yahoo fallback(fetch_yahoo_finance_history:301)會 import
        #   repositories.fund.sources,該 package module-load 時即 import bs4 並用 "lxml" parser。
        #   ⚠️ 若此 script 的 import 鏈長出新硬依賴,tests/test_fetch_nav_cache_ci_deps.py 會紅提醒同步本行。
        run: pip install requests pandas gspread google-auth beautifulsoup4 lxml

      - name: Fetch NAV cache
        env:
          # NAS proxy 中繼（台灣 IP）— 解 GitHub Actions 美國 IP 被台灣基金站封鎖。
          # 在 repo → Settings → Secrets and variables → Actions 新增 PROXY_URL。
          # 未設則直連（覆蓋率低）。可選：再加 Sheet 同步用的 SA / sheet id。
          PROXY_URL: ${{ secrets.PROXY_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          POLICY_SHEET_ID: ${{ secrets.POLICY_SHEET_ID }}
        run: python scripts/fetch_nav_cache.py

      - name: Commit and push cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/nav/
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: update NAV cache $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi
